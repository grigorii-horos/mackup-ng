name: mackup-ng
base: core24
adopt-info: mackup-ng
title: mackup-ng
summary: Keep your application settings in sync
description: |
  Keeps your application settings in sync through a safe directory
  (e.g. Dropbox) across all your workstations.

license: GPL-3.0-or-later
contact: horosgrisa@gmail.com
website: https://github.com/grigorii-horos/mackup-ng
source-code: https://github.com/grigorii-horos/mackup-ng
issues: https://github.com/grigorii-horos/mackup-ng/issues

grade: stable
confinement: classic

apps:
  mackup-ng:
    command: bin/mackup-ng

parts:
  mackup-ng:
    plugin: python
    source: .
    stage-packages:
      - python3.12-minimal
      - libpython3.12-minimal
      - libpython3.12-stdlib
    override-pull: |
      craftctl default
      VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
      craftctl set version="$VERSION"
